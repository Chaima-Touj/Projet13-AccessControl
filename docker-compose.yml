version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: projet13_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: projet13_access_control

  server:
    build: ./server
    container_name: projet13_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/projet13_access_control
      JWT_SECRET: change_this_super_secret_in_production
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: projet13_client
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
